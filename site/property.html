<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Property Details — Travellir Premier Rentals</title>
  <meta name="description" content="View property details, amenities, and availability. Book your stay with Travellir Premier Rentals.">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/webp" href="assets/images/logo.webp">
</head>
<body>
  <div id="site-header"></div>

  <section class="section" style="padding-top:calc(var(--header-height) + var(--space-2xl));">
    <div class="container">
      <!-- Back link -->
      <a href="properties.html" class="btn btn--outline" style="margin-bottom:var(--space-xl);display:inline-flex;font-size:0.82rem;padding:10px 20px;border-color:var(--dark-20);color:var(--dark-60);">
        ← Back to Properties
      </a>

      <div id="property-detail" class="property-detail">
        <!-- Content loaded by JS based on ?id= param -->
      </div>
    </div>
  </section>

  <!-- Hostfully Booking Widget Placeholder -->
  <section class="section" id="booking" style="padding-top:0;">
    <div class="container">
      <div class="reveal" style="background:linear-gradient(135deg,var(--navy-900),var(--navy-800));border:1px solid var(--white-10);border-radius:var(--radius-xl);padding:var(--space-2xl);text-align:center;">
        <h3 style="font-family:var(--font-display);font-size:1.5rem;color:var(--white);margin-bottom:var(--space-sm);">Book This Property</h3>
        <p style="color:rgba(255,255,255,0.5);font-size:0.9rem;margin-bottom:var(--space-xl);">Check availability and pricing — powered by Hostfully.</p>
        <div id="hostfully-booking-widget" style="min-height:200px;display:flex;align-items:center;justify-content:center;border:2px dashed rgba(255,255,255,0.12);border-radius:var(--radius-lg);padding:var(--space-2xl);">
          <div style="text-align:center;">
            <p style="color:rgba(255,255,255,0.35);font-size:0.85rem;margin-bottom:var(--space-md);">Hostfully booking calendar will appear here</p>
            <a href="contact.html" class="btn btn--primary">Inquire to Book</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="shared.js"></script>
  <script>
  /* Property Detail Page Logic — reads from shared TravellirData */
  (function() {
    'use strict';

    function renderDetail() {
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id');
      var container = document.getElementById('property-detail');

      if (!window.TravellirData) {
        container.innerHTML = '<p>Error loading property data.</p>';
        return;
      }

      var prop = window.TravellirData.getProperty(id);

      if (!prop) {
        container.innerHTML = '<div style="text-align:center;padding:var(--space-4xl) 0;"><h2 class="heading-section">Property Not Found</h2><p class="text-body" style="margin:var(--space-md) 0;">The property you\'re looking for doesn\'t exist or has been removed.</p><a href="properties.html" class="btn btn--primary">Browse All Properties</a></div>';
        document.title = 'Property Not Found — Travellir';
        return;
      }

      document.title = prop.title + ' — Travellir Premier Rentals';

      var amenitiesHtml = '';
      if (prop.amenities && prop.amenities.length) {
        prop.amenities.forEach(function(a) {
          amenitiesHtml += '<div style="display:flex;align-items:center;gap:8px;font-size:0.88rem;color:var(--dark-60);padding:10px 14px;background:var(--cream);border-radius:var(--radius-md);">✓ ' + a + '</div>';
        });
      }

      var rulesHtml = '';
      if (prop.rules && prop.rules.length) {
        prop.rules.forEach(function(r) {
          rulesHtml += '<li style="font-size:0.88rem;color:var(--dark-60);padding:8px 0;border-bottom:1px solid var(--dark-06);">• ' + r + '</li>';
        });
      }

      container.innerHTML =
        '<div class="property-detail__grid">' +
          '<div class="property-detail__gallery reveal">' +
            '<img src="' + prop.image + '" alt="' + prop.title + '" class="property-detail__main-image">' +
            '<div class="property-detail__badges">' +
              '<span class="property-card__badge-item">' + prop.types + '</span>' +
            '</div>' +
          '</div>' +
          '<div class="property-detail__info reveal">' +
            '<div class="property-card__location" style="margin-bottom:var(--space-sm);">' +
              '<svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg> ' +
              prop.location +
            '</div>' +
            '<h1 style="font-family:var(--font-display);font-size:clamp(1.8rem,4vw,2.6rem);font-weight:600;color:var(--dark);margin-bottom:var(--space-md);">' + prop.title + '</h1>' +
            '<div style="display:flex;gap:var(--space-lg);margin-bottom:var(--space-lg);flex-wrap:wrap;">' +
              '<div style="display:flex;align-items:center;gap:6px;font-size:0.95rem;color:var(--dark-60);">🛏 ' + prop.beds + '</div>' +
              '<div style="display:flex;align-items:center;gap:6px;font-size:0.95rem;color:var(--dark-60);">🛁 ' + prop.baths + '</div>' +
              '<div style="display:flex;align-items:center;gap:6px;font-size:0.95rem;color:var(--dark-60);">👥 ' + prop.guests + '</div>' +
              '<div style="display:flex;align-items:center;gap:6px;font-size:0.95rem;color:var(--gold-600);">⭐ ' + prop.rating + '</div>' +
            '</div>' +
            '<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:var(--space-xl);">' +
              '<span style="font-family:var(--font-display);font-size:2rem;font-weight:700;color:var(--navy-700);">' + prop.price + '</span>' +
              '<span style="font-size:0.9rem;color:var(--dark-40);">/ night</span>' +
            '</div>' +
            '<p style="font-size:0.95rem;line-height:1.8;color:var(--dark-60);margin-bottom:var(--space-xl);">' + prop.description + '</p>' +
            '<div style="margin-bottom:var(--space-xl);">' +
              '<h3 style="font-family:var(--font-body);font-size:0.85rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--dark-40);margin-bottom:var(--space-md);">Amenities</h3>' +
              '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;">' +
                amenitiesHtml +
              '</div>' +
            '</div>' +
            '<div style="margin-bottom:var(--space-xl);">' +
              '<h3 style="font-family:var(--font-body);font-size:0.85rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--dark-40);margin-bottom:var(--space-md);">House Rules</h3>' +
              '<ul style="list-style:none;padding:0;">' +
                rulesHtml +
              '</ul>' +
            '</div>' +
            '<div style="display:flex;gap:var(--space-md);flex-wrap:wrap;">' +
              '<a href="#booking" class="btn btn--primary">Book This Property</a>' +
              '<a href="contact.html" class="btn btn--outline" style="border-color:var(--navy-400);color:var(--navy-500);">Send Inquiry</a>' +
            '</div>' +
          '</div>' +
        '</div>';
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', renderDetail);
    } else {
      renderDetail();
    }
  })();
  </script>
</body>
</html>
